<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>World Cup Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="container">
    <div class="hero">
        <h1>🏆 FIFA World Cup 2026 Predictor</h1>
        <p>Predict matches, simulate the tournament, and discover the next World Champion.</p>
    </div>    
<label for="groupFilter">Filter by Group</label>
<select id="groupFilter">
    <option value="All">All Groups</option>
    <option value="A">Group A</option>
    <option value="B">Group B</option>
    <option value="C">Group C</option>
    <option value="D">Group D</option>
    <option value="E">Group E</option>
    <option value="F">Group F</option>
    <option value="G">Group G</option>
    <option value="H">Group H</option>
    <option value="I">Group I</option>
    <option value="J">Group J</option>
    <option value="K">Group K</option>
    <option value="L">Group L</option>
</select>

<label for="matchSelect">Select a Match</label>
<select id="matchSelect">
        
            <option value="">Loading matches...</option>
        </select>

        <button id="predictBtn">Predict Match</button>
        <button id="simulateBtn">Simulate Group Stage</button>
        <button id="worldCupBtn">Simulate Entire World Cup</button>

        <div id="worldCupResult" class="result">
            <h2>World Cup Simulation</h2>
            <div id="worldCupOutput"></div>
        </div>

        <div id="result" class="result">
            <h2>Prediction</h2>
            <p id="matchInfo">Match: -</p>
            <p id="winner">Predicted Winner: -</p>
            <p id="chance">Win Chance: -</p>
            <p id="teamScores">Team Scores: -</p>
            <p id="reason">Reason: -</p>
        </div>
        <div id="standingsResult" class="result">
            <h2>Group Stage Simulation</h2>
            <div id="standings"></div>
        </div>

    <script src="script.js"></script>
</body>
</html>
